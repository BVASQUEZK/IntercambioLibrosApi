spring.application.name=intercambiolibrosapi
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:serber-db-server-db.b.aivencloud.com}:${DB_PORT:26614}/${DB_NAME:defaultdb}?sslmode=require}
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASS:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://intercambiolibrosapp.onrender.com}
security.jwt.secret=${JWT_SECRET:intercambio-libros-default-secret-change-me}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.login-rate-limit.max-attempts=${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:8}
security.login-rate-limit.window-ms=${LOGIN_RATE_LIMIT_WINDOW_MS:900000}
security.login-rate-limit.block-ms=${LOGIN_RATE_LIMIT_BLOCK_MS:900000}
