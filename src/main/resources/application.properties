spring.application.name=intercambiolibrosapi
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:serber-db-server-db.b.aivencloud.com}:${DB_PORT:26614}/${DB_NAME:defaultdb}?sslmode=require}
spring.datasource.username=${DB_USER:avnadmin}
spring.datasource.password=${DB_PASS:${DB_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

spring.datasource.hikari.connection-timeout=30000
logging.level.org.springframework.web=DEBUG
